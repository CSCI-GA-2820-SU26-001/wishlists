---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-image
spec:
  description: Build and push the Wishlist service container image.
  params:
    - name: image
      description: Fully qualified image name to build and push.
      type: string
      default: image-registry.openshift-image-registry.svc:5000/$(context.taskRun.namespace)/wishlist:latest
    - name: context
      description: Build context directory.
      type: string
      default: "."
    - name: dockerfile
      description: Path to the Dockerfile.
      type: string
      default: "./Dockerfile"
  workspaces:
    - name: source
      description: Workspace containing the application source code.
  steps:
    - name: build-and-push
      image: quay.io/buildah/stable:latest
      workingDir: $(workspaces.source.path)
      securityContext:
        privileged: true
      script: |
        #!/bin/sh
        set -e

        buildah --storage-driver=vfs bud \
          --format=docker \
          --tls-verify=false \
          -f $(params.dockerfile) \
          -t $(params.image) \
          $(params.context)

        buildah --storage-driver=vfs push \
          --tls-verify=false \
          $(params.image) \
          docker://$(params.image)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-to-kubernetes
spec:
  description: Deploy the Wishlist service to Kubernetes or OpenShift.
  params:
    - name: image
      description: Fully qualified image name to deploy.
      type: string
      default: image-registry.openshift-image-registry.svc:5000/$(context.taskRun.namespace)/wishlist:latest
    - name: manifest-dir
      description: Directory containing Kubernetes manifests.
      type: string
      default: k8s
    - name: deployment-name
      description: Kubernetes deployment name.
      type: string
      default: wishlist
    - name: container-name
      description: Container name in the Kubernetes deployment.
      type: string
      default: wishlist
  workspaces:
    - name: source
      description: Workspace containing the application source code.
  steps:
    - name: deploy
      image: bitnami/kubectl:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e

        kubectl apply -R -f $(params.manifest-dir)
        kubectl set image deployment/$(params.deployment-name) \
          $(params.container-name)=$(params.image)
        kubectl rollout status deployment/$(params.deployment-name)
